version: "3.9"

# ─────────────────────────────────────────────
# Tradigo Ultra — Development Docker Compose
# Runs just PostgreSQL so you can develop locally
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   pnpm --filter @workspace/db run push
#   pnpm --filter @workspace/api-server run dev
#   pnpm --filter @workspace/tradigo run dev
# ─────────────────────────────────────────────

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       tradigo
      POSTGRES_USER:     tradigo
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradigo"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata_dev:
