android {
    namespace "com.tradigoultra.app"
    compileSdkVersion 34

    defaultConfig {
        applicationId "com.tradigoultra.app"
        minSdkVersion 24
        targetSdkVersion 34

        versionCode 2
        versionName "1.1"
    }

    signingConfigs {
        release {
            storeFile file("tradigo-release-key (1).jks")
            storePassword "123456"
            keyAlias "tradigo"
            keyPassword "123456"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
    }
}
