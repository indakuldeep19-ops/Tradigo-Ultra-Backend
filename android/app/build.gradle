plugins {
    id 'com.android.application' version '8.1.1'
}

android {
    namespace "com.tradigo.ultra"
    compileSdk 34

    defaultConfig {
        applicationId "com.tradigo.ultra"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
}
