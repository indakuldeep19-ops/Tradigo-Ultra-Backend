buildscript {
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:8.1.1'
    }
}

apply plugin: 'com.android.application'

repositories {
    google()
    mavenCentral()
}

android {
    namespace "com.tradigo.ultra"
    compileSdkVersion 34

    defaultConfig {
        applicationId "com.tradigo.ultra"
        minSdkVersion 24
        targetSdkVersion 34
        
        versionCode 2
        versionName "1.1"
    }

    signingConfigs {
        release {
            storeFile file("tradigo-release-key.jks")
            storePassword "tradigo123"
            keyAlias "tradigo"
            keyPassword "tradigo123"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
    }
}

dependencies {

}
