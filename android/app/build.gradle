apply plugin: 'com.android.application'

android {
    namespace "com.tradigo.ultra"
    compileSdkVersion 34

    defaultConfig {
        applicationId "com.tradigo.ultra"
        minSdkVersion 24
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
}
